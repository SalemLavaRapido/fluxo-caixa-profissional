<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensalistas - Controle Completo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --danger-gradient: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --info-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        body.loaded {
            opacity: 1;
        }
        
        .navbar-custom {
            background: var(--primary-gradient);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .card-cliente {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .card-cliente:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .card-cliente-header {
            background: var(--primary-gradient);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-cliente-body {
            padding: 20px;
        }
        
        .cliente-nome {
            font-size: 1.4em;
            font-weight: bold;
            margin: 0;
        }
        
        .cliente-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .cliente-info-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 10px;
        }
        
        .cliente-info-item i {
            margin-right: 8px;
            color: #667eea;
        }
        
        .veiculo-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .veiculo-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .placa-badge {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            letter-spacing: 2px;
        }
        
        .lavagem-ok {
            background: var(--success-gradient);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        
        .lavagem-alerta {
            background: var(--danger-gradient);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        .btn-whatsapp {
            background: #25D366;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .btn-whatsapp:hover {
            background: #128C7E;
            color: #fff;
            transform: translateY(-2px);
        }
        
        .btn-lavagem {
            background: var(--info-gradient);
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
        }
        
        .btn-pagamento {
            background: var(--success-gradient);
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
        }
        
        .btn-add-veiculo {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px dashed rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            width: 100%;
            transition: all 0.3s;
        }
        
        .btn-add-veiculo:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .card-novo-cliente {
            background: var(--success-gradient);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.3);
        }
        
        .form-control-custom {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 10px;
            padding: 12px 15px;
        }
        
        .form-control-custom:focus {
            box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
        }
        
        .stats-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .stats-number {
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .modal-custom .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
        }
        
        .modal-custom .modal-header {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .modal-header-lavagem {
            background: var(--info-gradient);
            border-radius: 20px 20px 0 0;
        }
        
        .modal-header-pagamento {
            background: var(--success-gradient);
            border-radius: 20px 20px 0 0;
        }
        
        .modal-header-veiculo {
            background: var(--primary-gradient);
            border-radius: 20px 20px 0 0;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        .btn-voltar {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 10px;
        }
        
        .btn-voltar:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .status-pago {
            background: var(--success-gradient);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        
        .status-pendente {
            background: #ffc107;
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        
        .status-atrasado {
            background: var(--danger-gradient);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        
        .veiculos-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .veiculos-title {
            font-size: 0.9em;
            color: rgba(255,255,255,0.7);
            margin-bottom: 10px;
        }
        
        .alertas-pagamento {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .alerta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
        }
        
        .alerta-vence-2dias {
            border-left: 4px solid #ffc107;
        }
        
        .alerta-vence-hoje {
            border-left: 4px solid #17a2b8;
        }
        
        .alerta-atrasado {
            border-left: 4px solid #dc3545;
            background: rgba(220, 53, 69, 0.2);
        }
        
        .badge-dias {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
        }
        
        .badge-2dias {
            background: #ffc107;
            color: #000;
        }
        
        .badge-hoje {
            background: #17a2b8;
            color: #fff;
        }
        
        .badge-atrasado {
            background: #dc3545;
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-users me-2"></i>Mensalistas
            </a>
            <div class="d-flex align-items-center">
                <span class="me-3" id="userInfo"></span>
                <a href="index.html" class="btn btn-voltar me-2">
                    <i class="fas fa-arrow-left me-2"></i>Voltar
                </a>
                <button class="btn btn-outline-light" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Container Principal -->
    <div class="container py-4">
        <!-- Alertas -->
        <div id="alertContainer"></div>
        
        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stats-card">
                    <i class="fas fa-users fa-2x mb-2" style="color: #667eea;"></i>
                    <div class="stats-number" id="totalClientes">0</div>
                    <div>Clientes Ativos</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card">
                    <i class="fas fa-credit-card fa-2x mb-2" style="color: #38ef7d;"></i>
                    <div class="stats-number" id="mensalidadesAtivas">0</div>
                    <div>Mensalidades Ativas</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card">
                    <i class="fas fa-dollar-sign fa-2x mb-2" style="color: #4facfe;"></i>
                    <div class="stats-number" id="faturamentoMensal">R$ 0</div>
                    <div>Faturamento Mensal</div>
                </div>
            </div>
        </div>
        
        <!-- Card Novo Cliente -->
        <div class="card-novo-cliente">
            <h4 class="mb-4">
                <i class="fas fa-user-plus me-2"></i>Cadastrar Novo Mensalista
            </h4>
            <form id="formCliente" class="row g-3">
                <div class="col-md-2">
                    <input type="text" class="form-control form-control-custom" id="clienteNome" 
                           placeholder="Nome do Cliente" required>
                </div>
                <div class="col-md-2">
                    <input type="tel" class="form-control form-control-custom" id="clienteTelefone" 
                           placeholder="Telefone" required>
                </div>
                <div class="col-md-2">
                    <input type="text" class="form-control form-control-custom" id="clienteEmpresa" 
                           placeholder="Empresa (opcional)">
                </div>
                <div class="col-md-1">
                    <input type="number" class="form-control form-control-custom" id="clienteValor" 
                           placeholder="Valor" step="0.01" min="0">
                </div>
                <div class="col-md-2">
                    <input type="date" class="form-control form-control-custom" id="clienteVencimento" 
                           title="Data do primeiro vencimento">
                </div>
                <div class="col-md-2">
                    <input type="text" class="form-control form-control-custom" id="clienteObservacao" 
                           placeholder="Observação (opcional)">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-light w-100" style="font-weight: bold;">
                        <i class="fas fa-plus me-2"></i>Cadastrar
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Alertas de Pagamento -->
        <div class="alertas-pagamento" id="secaoAlertas" style="display: none;">
            <h5 class="mb-3">
                <i class="fas fa-bell me-2"></i>Alertas de Pagamento
                <span class="badge bg-danger ms-2" id="totalAlertas">0</span>
            </h5>
            <div id="listaAlertas"></div>
        </div>
        
        <!-- Buscador de Clientes -->
        <div class="card-novo-cliente mb-3" style="background: rgba(255,255,255,0.05);">
            <div class="row g-2 align-items-center">
                <div class="col-md-5">
                    <div class="input-group">
                        <span class="input-group-text" style="background: rgba(102, 126, 234, 0.3); border-color: rgba(102, 126, 234, 0.3); color: #fff;">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" class="form-control form-control-custom" id="buscaCliente" 
                               placeholder="Buscar por nome..." onkeyup="filtrarClientes()">
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="input-group">
                        <span class="input-group-text" style="background: rgba(102, 126, 234, 0.3); border-color: rgba(102, 126, 234, 0.3); color: #fff;">
                            <i class="fas fa-car"></i>
                        </span>
                        <input type="text" class="form-control form-control-custom" id="buscaPlaca" 
                               placeholder="Buscar por placa..." style="text-transform: uppercase;" onkeyup="filtrarClientes()">
                    </div>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-light w-100" onclick="limparBusca()">
                        <i class="fas fa-times me-1"></i>Limpar
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Lista de Clientes -->
        <div id="listaClientes">
            <div class="empty-state">
                <i class="fas fa-users"></i>
                <p>Nenhum cliente cadastrado</p>
            </div>
        </div>
    </div>

    <!-- Modal Adicionar Veículo -->
    <div class="modal fade modal-custom" id="modalVeiculo" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header modal-header-veiculo">
                    <h5 class="modal-title">
                        <i class="fas fa-car me-2"></i>Adicionar Veículo
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="veiculoClienteId">
                    <div class="mb-3">
                        <label class="form-label">Placa</label>
                        <input type="text" class="form-control form-control-custom" id="veiculoPlaca" 
                               maxlength="7" style="text-transform: uppercase;" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Modelo</label>
                        <input type="text" class="form-control form-control-custom" id="veiculoModelo">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cor</label>
                        <input type="text" class="form-control form-control-custom" id="veiculoCor">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarVeiculo()">
                        <i class="fas fa-save me-2"></i>Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Registrar Pagamento -->
    <div class="modal fade modal-custom" id="modalPagamento" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header modal-header-pagamento">
                    <h5 class="modal-title">
                        <i class="fas fa-dollar-sign me-2"></i>Registrar Pagamento
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="pagamentoClienteId">
                    
                    <div class="text-center mb-4">
                        <h5 id="pagamentoClienteNome">Cliente</h5>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Mês Referência</label>
                        <input type="month" class="form-control form-control-custom" id="pagamentoMes">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Valor (R$)</label>
                        <input type="number" class="form-control form-control-custom" id="pagamentoValor" 
                               step="0.01" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Forma de Pagamento</label>
                        <select class="form-control form-control-custom" id="pagamentoForma">
                            <option value="dinheiro">Dinheiro</option>
                            <option value="pix">Pix</option>
                            <option value="debito">Débito</option>
                            <option value="credito">Crédito</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" onclick="salvarPagamento()">
                        <i class="fas fa-check me-2"></i>Confirmar Pagamento
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Editar Cliente -->
    <div class="modal fade modal-custom" id="modalEditarCliente" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                    <h5 class="modal-title">
                        <i class="fas fa-user-edit me-2"></i>Editar Cliente
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editarClienteId">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control form-control-custom" id="editarClienteNome" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefone</label>
                        <input type="tel" class="form-control form-control-custom" id="editarClienteTelefone" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Empresa</label>
                        <input type="text" class="form-control form-control-custom" id="editarClienteEmpresa" placeholder="(opcional)">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Valor Mensal (R$)</label>
                            <input type="number" class="form-control form-control-custom" id="editarClienteValor" step="0.01" min="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Data Vencimento</label>
                            <input type="date" class="form-control form-control-custom" id="editarClienteVencimento">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Observação</label>
                        <textarea class="form-control form-control-custom" id="editarClienteObservacao" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarEdicaoCliente()">
                        <i class="fas fa-save me-2"></i>Salvar Alterações
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Histórico de Lavagens -->
    <div class="modal fade modal-custom" id="modalHistoricoLavagens" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #17a2b8, #138496);">
                    <h5 class="modal-title">
                        <i class="fas fa-soap me-2"></i>Histórico de Lavagens - <span id="historicoLavagensNome"></span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="max-height: 60vh; overflow-y: auto;">
                    <div id="tabelaHistoricoLavagens"></div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Histórico de Pagamentos -->
    <div class="modal fade modal-custom" id="modalHistoricoPagamentos" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #28a745, #1e7e34);">
                    <h5 class="modal-title">
                        <i class="fas fa-receipt me-2"></i>Histórico de Pagamentos - <span id="historicoPagamentosNome"></span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="max-height: 60vh; overflow-y: auto;">
                    <div id="tabelaHistoricoPagamentos"></div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Configuração Supabase
        const SUPABASE_URL = 'https://emkiewosmlnyjnpujbui.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVta2lld29zbWxueWpucHVqYnVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDMxOTIsImV4cCI6MjA5MjM3OTE5Mn0.ohXoyqFJfyJxlyS1Efpykr0l0zezC2MZjVJWf55NV0c';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Variáveis globais
        let clientes = [];
        let veiculos = [];
        let lavagens = [];
        let pagamentos = [];
        let filtroAtual = '';
        
        // Verificar login ao carregar
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            document.body.classList.add('loaded');
            document.getElementById('userInfo').textContent = user.email;
            
            // Definir mês atual no campo de pagamento
            const hoje = new Date();

        // Cadastrar cliente
        async function cadastrarCliente() {
            const nome = document.getElementById('clienteNome').value.trim();
            const telefone = document.getElementById('clienteTelefone').value.replace(/\D/g, '');
            const empresa = document.getElementById('clienteEmpresa').value.trim();
            const valor = parseFloat(document.getElementById('clienteValor').value) || 0;
            const dataVencimento = document.getElementById('clienteVencimento').value || null;
            const observacao = document.getElementById('clienteObservacao').value.trim();
            
            if (!nome || !telefone) {
                showAlert('Preencha nome e telefone!', 'warning');
                return;
            }
            
            const user = JSON.parse(localStorage.getItem('currentUser'));
            
            const { data, error } = await supabaseClient
                .from('clientes_estacionamento')
                .insert([{
                    user_id: user.id,
                    nome: nome,
                    telefone: telefone,
                    empresa: empresa,
                    valor_mensal: valor,
                    data_vencimento: dataVencimento,
                    observacao: observacao
                }]);
            
            if (error) {
                showAlert('Erro ao cadastrar: ' + error.message, 'danger');
                return;
            }
            
            showAlert(`Cliente ${nome} cadastrado com sucesso!`, 'success');
            document.getElementById('formCliente').reset();
            
            await carregarDados();
        }
        
        // Carregar todos os dados
        async function carregarDados() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) return;
            
            // Carregar clientes
            const { data: clientesData } = await supabaseClient
                .from('clientes_estacionamento')
                .select('*')
                .eq('user_id', user.id)
                .eq('status', 'ativo')
                .order('nome');
            
            clientes = clientesData || [];
            
            // Carregar veículos
            const { data: veiculosData } = await supabaseClient
                .from('veiculos')
                .select('*')
                .eq('user_id', user.id);
            
            veiculos = veiculosData || [];
            
            // Carregar lavagens (últimos 60 dias)
            const dataLimite = new Date();
            dataLimite.setDate(dataLimite.getDate() - 60);
            
            const { data: lavagensData } = await supabaseClient
                .from('lavagens')
                .select('*')
                .eq('user_id', user.id)
                .gte('data_lavagem', dataLimite.toISOString());
            
            lavagens = lavagensData || [];
            
            // Carregar pagamentos (últimos 12 meses)
            const dataLimitePag = new Date();
            dataLimitePag.setMonth(dataLimitePag.getMonth() - 12);
            
            const { data: pagamentosData } = await supabaseClient
                .from('pagamentos_mensalidade')
                .select('*')
                .eq('user_id', user.id)
                .gte('data_pagamento', dataLimitePag.toISOString());
            
            pagamentos = pagamentosData || [];
            
            renderizarClientes();
            atualizarEstatisticas();
            verificarAlertasPagamento();
        }
        
        // Filtrar clientes por nome ou placa
        function filtrarClientes() {
            const buscaNome = document.getElementById('buscaCliente').value.toLowerCase().trim();
            const buscaPlaca = document.getElementById('buscaPlaca').value.toUpperCase().trim();
            
            filtroAtual = buscaNome || buscaPlaca;
            renderizarClientes();
        }
        
        // Limpar busca
        function limparBusca() {
            document.getElementById('buscaCliente').value = '';
            document.getElementById('buscaPlaca').value = '';
            filtroAtual = '';
            renderizarClientes();
        }
        
        // Obter pagamentos de um cliente
        function getPagamentosCliente(clienteId) {
            return pagamentos
                .filter(p => p.cliente_id === clienteId)
                .sort((a, b) => new Date(b.data_pagamento) - new Date(a.data_pagamento));
        }

        // Obter última lavagem de um veículo
        function getUltimaLavagem(veiculoId) {
            const lavagensVeiculo = lavagens.filter(l => l.veiculo_id === veiculoId);
            if (lavagensVeiculo.length === 0) return null;
            
            return lavagensVeiculo.sort((a, b) => new Date(b.data_lavagem) - new Date(a.data_lavagem))[0];
        }
        
        // Calcular dias sem lavar
        function calcularDiasSemLavar(dataLavagem) {
            const ultima = new Date(dataLavagem);
            const hoje = new Date();
            const diffMs = hoje - ultima;
            return Math.floor(diffMs / (1000 * 60 * 60 * 24));
        }
        
        // Obter lavagens de todos os veículos de um cliente (busca por placa)
        function getLavagensCliente(veiculosCliente) {
            const placasCliente = veiculosCliente.map(v => v.placa.toUpperCase());
            return lavagens
                .filter(l => {
                    // Busca por placa (da fila de lavagem) ou por veiculo_id (legado)
                    const placaLavagem = (l.placa || '').toUpperCase();
                    return placasCliente.includes(placaLavagem) || veiculosCliente.some(v => v.id === l.veiculo_id);
                })
                .sort((a, b) => new Date(b.data_lavagem) - new Date(a.data_lavagem));
        }
        
        // Formatar data
        function formatarData(data) {
            if (!data) return '-';
            return new Date(data).toLocaleDateString('pt-BR');
        }
        
        // Formatar tipo de lavagem
        function formatarTipoLavagem(tipo) {
            const tipos = {
                'simples': 'Simples',
                'completa': 'Completa',
                'polimento': 'Polimento',
                'higienizacao': 'Higienização'
            };
            return tipos[tipo] || tipo || '-';
        }
        
        // Formatar mês de referência (YYYY-MM para Mês/Ano)
        function formatarMesReferencia(mesRef) {
            if (!mesRef) return '-';
            const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            const [ano, mes] = mesRef.split('-');
            return `${meses[parseInt(mes) - 1]}/${ano}`;
        }
        
        // Formatar forma de pagamento
        function formatarFormaPagamento(forma) {
            const formas = {
                'dinheiro': '<i class="fas fa-money-bill-wave text-success"></i>',
                'pix': '<i class="fas fa-qrcode text-primary"></i>',
                'debito': '<i class="fas fa-credit-card text-info"></i>',
                'credito': '<i class="fas fa-credit-card text-warning"></i>'
            };
            return formas[forma] || forma || '-';
        }
        
        // Salvar observação do cliente
        async function salvarObservacao(clienteId, observacao) {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) return;
            
            const { error } = await supabaseClient
                .from('clientes_estacionamento')
                .update({ observacao: observacao })
                .eq('id', clienteId);
            
            if (error) {
                showAlert('Erro ao salvar observação: ' + error.message, 'danger');
                return;
            }
            
            showAlert('Observação salva!', 'success');
        }
        
        // Excluir cliente
        async function excluirCliente(clienteId, nome) {
            if (!confirm(`Tem certeza que deseja excluir o cliente "${nome}"?\n\nIsso também excluirá todos os veículos e lavagens associados.`)) {
                return;
            }
            
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) return;
            
            try {
                // Buscar veículos do cliente
                const veiculosCliente = veiculos.filter(v => v.cliente_id === clienteId);
                const idsVeiculos = veiculosCliente.map(v => v.id);
                
                // Excluir lavagens dos veículos
                if (idsVeiculos.length > 0) {
                    await supabaseClient
                        .from('lavagens')
                        .delete()
                        .in('veiculo_id', idsVeiculos);
                }
                
                // Excluir veículos
                await supabaseClient
                    .from('veiculos')
                    .delete()
                    .eq('cliente_id', clienteId);
                
                // Excluir cliente (soft delete - muda status)
                const { error } = await supabaseClient
                    .from('clientes_estacionamento')
                    .update({ status: 'inativo' })
                    .eq('id', clienteId);
                
                if (error) {
                    showAlert('Erro ao excluir cliente: ' + error.message, 'danger');
                    return;
                }
                
                showAlert(`Cliente "${nome}" excluído!`, 'success');
                await carregarDados();
                
            } catch (error) {
                console.error('Erro ao excluir cliente:', error);
                showAlert('Erro ao excluir cliente', 'danger');
            }
        }
        
        // Abrir modal de edição do cliente
        function abrirModalEditarCliente(clienteId) {
            const cliente = clientes.find(c => c.id === clienteId);
            if (!cliente) return;
            
            document.getElementById('editarClienteId').value = cliente.id;
            document.getElementById('editarClienteNome').value = cliente.nome || '';
            document.getElementById('editarClienteTelefone').value = cliente.telefone || '';
            document.getElementById('editarClienteEmpresa').value = cliente.empresa || '';
            document.getElementById('editarClienteValor').value = cliente.valor_mensal || 0;
            // Se tem data_vencimento usa ela, senão deixa vazio para o usuário preencher
            document.getElementById('editarClienteVencimento').value = cliente.data_vencimento || '';

        // Salvar edição do cliente
        async function salvarEdicaoCliente() {

            const nome = document.getElementById('editarClienteNome').value.trim();
            const telefone = document.getElementById('editarClienteTelefone').value.replace(/\D/g, '');

                .update({

                    telefone: telefone,
                    empresa: empresa,
                    valor_mensal: valor,

            modal.show();
        }
        
        // Excluir veículo
        async function excluirVeiculo(veiculoId, placa) {
            if (!confirm(`Tem certeza que deseja excluir o veículo "${placa}"?\n\nIsso também excluirá todas as lavagens associadas.`)) {
                return;
            }
            
            try {
                // Excluir lavagens do veículo
                await supabaseClient
                    .from('lavagens')
                    .delete()
                    .eq('veiculo_id', veiculoId);
                
                // Excluir veículo
                const { error } = await supabaseClient
                    .from('veiculos')
                    .delete()
                    .eq('id', veiculoId);
                
                if (error) {
                    showAlert('Erro ao excluir veículo: ' + error.message, 'danger');
                    return;
                }
                
                showAlert(`Veículo "${placa}" excluído!`, 'success');
                await carregarDados();
                
            } catch (error) {
                console.error('Erro ao excluir veículo:', error);
                showAlert('Erro ao excluir veículo', 'danger');
            }
        }
        
        // Excluir lavagem
        async function excluirLavagem(lavagemId, placa) {
            if (!confirm(`Tem certeza que deseja excluir esta lavagem do veículo "${placa}"?`)) {
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('lavagens')
                    .delete()
                    .eq('id', lavagemId);
                
                if (error) {
                    showAlert('Erro ao excluir lavagem: ' + error.message, 'danger');
                    return;
                }
                
                showAlert('Lavagem excluída!', 'success');
                await carregarDados();
                
            } catch (error) {
                console.error('Erro ao excluir lavagem:', error);
                showAlert('Erro ao excluir lavagem', 'danger');
            }
        }
        
        // Atualizar estatísticas
        function atualizarEstatisticas() {
            document.getElementById('totalClientes').textContent = clientes.length;
            document.getElementById('totalVeiculos').textContent = veiculos.length;
            
            // Contar alertas de lavagem
            let alertas = 0;
            veiculos.forEach(v => {
                const ultimaLavagem = getUltimaLavagem(v.id);
                const dias = ultimaLavagem ? calcularDiasSemLavar(ultimaLavagem.data_lavagem) : 999;
                if (dias > 30) alertas++;
            });
            document.getElementById('alertasLavagem').textContent = alertas;
            
            // Receita mensal esperada
            const receita = clientes.reduce((sum, c) => sum + parseFloat(c.valor_mensal || 0), 0);
            document.getElementById('receitaMensal').textContent = `R$ ${receita.toFixed(0)}`;
        }
        
        // Abrir modal de veículo
        function abrirModalVeiculo(clienteId) {
            document.getElementById('veiculoClienteId').value = clienteId;
            document.getElementById('veiculoPlaca').value = '';
            document.getElementById('veiculoModelo').value = '';
            document.getElementById('veiculoCor').value = '';
            
            const modal = new bootstrap.Modal(document.getElementById('modalVeiculo'));
            modal.show();
        }
        
        // Editar veículo
        async function editarVeiculo(veiculoId) {
            try {
                const user = JSON.parse(localStorage.getItem('currentUser'));
                
                // Buscar dados do veículo
                const { data: veiculo, error } = await supabaseClient
                    .from('veiculos')
                    .select('*')
                    .eq('id', veiculoId)
                    .eq('user_id', user.id)
                    .single();
                
                if (error || !veiculo) {
                    showAlert('Veículo não encontrado!', 'danger');
                    return;
                }
                
                // Preencher o modal com os dados do veículo
                document.getElementById('veiculoClienteId').value = veiculo.cliente_id;
                document.getElementById('veiculoPlaca').value = veiculo.placa;
                document.getElementById('veiculoModelo').value = veiculo.modelo || '';
                document.getElementById('veiculoCor').value = veiculo.cor || '';
                
                // Adicionar campo hidden para identificar que é edição
                let veiculoIdInput = document.getElementById('veiculoId');
                if (!veiculoIdInput) {
                    veiculoIdInput = document.createElement('input');
                    veiculoIdInput.type = 'hidden';
                    veiculoIdInput.id = 'veiculoId';
                    document.getElementById('modalVeiculo').appendChild(veiculoIdInput);
                }
                veiculoIdInput.value = veiculoId;
                
                // Mudar título do modal
                const modalTitle = document.querySelector('#modalVeiculo .modal-title');
                if (modalTitle) {
                    modalTitle.textContent = 'Editar Veículo';
                }
                
                // Mudar texto do botão
                const saveBtn = document.querySelector('#modalVeiculo .btn-primary');
                if (saveBtn) {
                    saveBtn.textContent = 'Atualizar';
                }
                
                const modal = new bootstrap.Modal(document.getElementById('modalVeiculo'));
                modal.show();
                
            } catch (error) {
                console.error('Erro ao editar veículo:', error);
                showAlert('Erro ao carregar dados do veículo!', 'danger');
            }
        }
        
        // Salvar veículo
        async function salvarVeiculo() {
            const clienteId = document.getElementById('veiculoClienteId').value;
            const placa = document.getElementById('veiculoPlaca').value.toUpperCase().trim();
            const modelo = document.getElementById('veiculoModelo').value.trim();
            const cor = document.getElementById('veiculoCor').value.trim();
            const veiculoId = document.getElementById('veiculoId')?.value;
            
            if (!placa) {
                showAlert('Informe a placa!', 'warning');
                return;
            }
            
            const user = JSON.parse(localStorage.getItem('currentUser'));
            
            try {
                if (veiculoId) {
                    // Edição de veículo existente
                    const { error } = await supabaseClient
                        .from('veiculos')
                        .update({
                            placa: placa,
                            modelo: modelo,
                            cor: cor
                        })
                        .eq('id', veiculoId)
                        .eq('user_id', user.id);
                    
                    if (error) {
                        showAlert('Erro ao atualizar veículo!', 'danger');
                        return;
                    }
                    
                    showAlert('Veículo atualizado com sucesso!', 'success');
                } else {
                    // Novo veículo - verificar se placa já existe
                    const { data: existente } = await supabaseClient
                        .from('veiculos')
                        .select('*')
                        .eq('user_id', user.id)
                        .eq('placa', placa)
                        .single();
                    
                    if (existente) {
                        showAlert('Esta placa já está cadastrada!', 'danger');
                        return;
                    }
                    
                    const { error } = await supabaseClient
                        .from('veiculos')
                        .insert([{
                            cliente_id: clienteId,
                            user_id: user.id,
                            placa: placa,
                            modelo: modelo,
                            cor: cor
                        }]);
                    
                    if (error) {
                        showAlert('Erro ao salvar veículo!', 'danger');
                        return;
                    }
                    
                    showAlert('Veículo cadastrado com sucesso!', 'success');
                }
                
                // Fechar modal e recarregar dados
                const modalVeiculo = bootstrap.Modal.getInstance(document.getElementById('modalVeiculo'));
                modalVeiculo.hide();
                
                // Resetar modal para novo cadastro
                resetModalVeiculo();
                
                carregarDados();
                
            } catch (error) {
                console.error('Erro ao salvar veículo:', error);
                showAlert('Erro ao salvar veículo!', 'danger');
            }
        }
        
        // Resetar modal para novo cadastro
        function resetModalVeiculo() {
            // Remover campo hidden de ID se existir
            const veiculoIdInput = document.getElementById('veiculoId');
            if (veiculoIdInput) {
                veiculoIdInput.remove();
            }
            
            // Resetar título
            const modalTitle = document.querySelector('#modalVeiculo .modal-title');
            if (modalTitle) {
                modalTitle.textContent = 'Adicionar Veículo';
            }
            
            // Resetar texto do botão
            const saveBtn = document.querySelector('#modalVeiculo .btn-primary');
            if (saveBtn) {
                saveBtn.textContent = 'Salvar';
            }
        }
        
        // Salvar pagamento
        async function salvarPagamento() {
            const clienteId = document.getElementById('pagamentoClienteId').value;
            const clienteNome = document.getElementById('pagamentoClienteNome').textContent;
            const mes = document.getElementById('pagamentoMes').value;
            const valor = parseFloat(document.getElementById('pagamentoValor').value) || 0;
            const forma = document.getElementById('pagamentoForma').value;
            
            if (!mes || valor <= 0) {
                showAlert('Preencha mês e valor!', 'warning');
                return;
            }
            
            const user = JSON.parse(localStorage.getItem('currentUser'));
            
            // Salvar pagamento
            const { error: errorPag } = await supabaseClient
                .from('pagamentos_mensalidade')
                .insert([{
                    cliente_id: clienteId,
                    user_id: user.id,
                    mes_referencia: mes,
                    valor: valor,
                    forma_pagamento: forma
                }]);
            
            if (errorPag) {
                showAlert('Erro ao salvar: ' + errorPag.message, 'danger');
                return;
            }
            
            // Registrar no fluxo de caixa
            await supabaseClient
                .from('entradas')
                .insert([{
                    user_id: user.id,
                    data: new Date().toISOString().split('T')[0],
                    descricao: `Mensalidade ${mes} - ${clienteNome}`,
                    categoria: 'mensalista',
                    forma_pagamento: forma,
                    valor: valor
                }]);
            
            bootstrap.Modal.getInstance(document.getElementById('modalPagamento')).hide();
            showAlert(`Pagamento registrado: ${clienteNome} - R$ ${valor.toFixed(2)}`, 'success');
            
            await carregarDados();
        }
        
        // Verificar alertas de pagamento
        function verificarAlertasPagamento() {
            const hoje = new Date();
            const diaHoje = hoje.getDate();
            const mesAtual = hoje.getMonth();
            const anoAtual = hoje.getFullYear();
            
            const alertas = [];
            
            clientes.forEach(cliente => {
                let dataVencimento;
                let dataFormatada;
                let diaVencimento;
                
                // Verificar se tem data_vencimento (novo) ou dia_vencimento (antigo)
                if (cliente.data_vencimento) {
                    const dataOriginal = new Date(cliente.data_vencimento + 'T00:00:00');
                    diaVencimento = dataOriginal.getDate();
                    
                    // Se a data original ainda não passou, usa ela
                    if (dataOriginal >= hoje) {
                        dataVencimento = dataOriginal;
                    } else {
                        // Calcular vencimento do mês atual usando o dia
                        dataVencimento = new Date(anoAtual, mesAtual, diaVencimento);
                    }
                    dataFormatada = dataVencimento.toLocaleDateString('pt-BR');
                } else if (cliente.dia_vencimento) {
                    // Usar dia_vencimento no mês atual
                    diaVencimento = cliente.dia_vencimento;
                    dataVencimento = new Date(anoAtual, mesAtual, diaVencimento);
                    dataFormatada = `Dia ${diaVencimento}`;
                } else {
                    return; // Sem vencimento definido
                }
                
                // Diferença em dias
                const diffDias = Math.floor((dataVencimento - hoje) / (1000 * 60 * 60 * 24));
                
                // No dia do vencimento
                if (diffDias === 0) {
                    alertas.push({
                        tipo: 'hoje',
                        cliente: cliente,
                        dataFormatada: dataFormatada,
                        mensagem: 'Vence HOJE',
                        badge: 'badge-hoje',
                        classe: 'alerta-vence-hoje',
                        textoWhats: `Olá ${cliente.nome}! Sua mensalidade vence HOJE, ${dataFormatada}. Valor: R$ ${(cliente.valor_mensal || 0).toFixed(2)}. Aguardamos seu pagamento!`
                    });
                }
                
                // Atrasado (após vencimento)
                if (diffDias < 0) {
                    const diasAtraso = Math.abs(diffDias);
                    alertas.push({
                        tipo: 'atrasado',
                        cliente: cliente,
                        dataFormatada: dataFormatada,
                        mensagem: `${diasAtraso} dia(s) em atraso`,
                        badge: 'badge-atrasado',
                        classe: 'alerta-atrasado',
                        textoWhats: `Olá ${cliente.nome}! Sua mensalidade venceu em ${dataFormatada} e está em atraso há ${diasAtraso} dia(s). Valor: R$ ${(cliente.valor_mensal || 0).toFixed(2)}. Por favor, entre em contato para regularização.`
                    });
                }
            });
            
            // Renderizar alertas
            const secao = document.getElementById('secaoAlertas');
            const lista = document.getElementById('listaAlertas');
            const total = document.getElementById('totalAlertas');
            
            if (alertas.length === 0) {
                secao.style.display = 'none';
                return;
            }
            
            secao.style.display = 'block';
            total.textContent = alertas.length;
            
            lista.innerHTML = alertas.map(a => `
                <div class="alerta-item ${a.classe}">
                    <div>
                        <strong>${a.cliente.nome}</strong>
                        <span class="badge ${a.badge} ms-2">${a.mensagem}</span>
                        <br>
                        <small>Valor: R$ ${(a.cliente.valor_mensal || 0).toFixed(2)} | Venc. <strong>${a.dataFormatada}</strong></small>
                    </div>
                    <button class="btn btn-whatsapp btn-sm" onclick="abrirWhatsApp('${a.cliente.telefone}', '${a.textoWhats.replace(/'/g, "\\'")}')">
                        <i class="bi bi-whatsapp me-1"></i>Enviar
                    </button>
                </div>
            `).join('');
        }
        
        // Formatar telefone
        function formatarTelefone(tel) {
            if (!tel) return '-';
            tel = tel.replace(/\D/g, '');
            if (tel.length === 11) {
                return `(${tel.slice(0,2)}) ${tel.slice(2,7)}-${tel.slice(7)}`;
            }
            return tel;
        }
        
        // Abrir WhatsApp
        function abrirWhatsApp(numero, mensagem) {
            if (!numero) {
                showAlert('Cliente sem telefone cadastrado!', 'warning');
                return;
            }
            let tel = numero.replace(/\D/g, '');
            if (!tel.startsWith('55')) {
                tel = '55' + tel;
            }
            const url = `https://wa.me/${tel}?text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
        }
        
        // Mostrar alerta
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

            // Abrir janela de impressão
            const printWindow = window.open('', '_blank');

        // Logout
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
