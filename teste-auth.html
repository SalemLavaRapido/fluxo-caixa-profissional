<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Autenticação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 500px; margin: 50px auto; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status { padding: 10px; border-radius: 8px; margin: 10px 0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 class="text-center mb-4">Teste de Autenticação Supabase</h2>
            
            <div id="status"></div>
            
            <div class="mb-3">
                <button class="btn btn-primary w-100" onclick="testarAuth()">Testar Conexão e Criar Usuário</button>
            </div>
            
            <div class="mb-3">
                <button class="btn btn-success w-100" onclick="fazerLogin()">Fazer Login Teste</button>
            </div>
            
            <div class="mb-3">
                <button class="btn btn-info w-100" onclick="irParaSistema()">Ir para Sistema Principal</button>
            </div>
            
            <div id="resultados"></div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://emkiewosmlnyjnpujbui.supabase.co';
        const supabaseKey = 'sb_publishable_Bd982ryXG_esL01jPijc_A_2u3pY8vV';
        
        let supabase;
        
        function initSupabase() {
            try {
                supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                return true;
            } catch (error) {
                console.error('Erro ao inicializar Supabase:', error);
                return false;
            }
        }
        
        async function testarAuth() {
            const status = document.getElementById('status');
            const resultados = document.getElementById('resultados');
            
            if (initSupabase()) {
                status.innerHTML = '<div class="status success">✅ Supabase conectado!</div>';
                
                try {
                    // Criar usuário teste
                    const { data, error } = await supabase.auth.signUp({
                        email: 'teste' + Date.now() + '@exemplo.com',
                        password: '123456',
                        options: {
                            data: {
                                name: 'Usuário Teste'
                            }
                        }
                    });
                    
                    if (error) {
                        if (error.message.includes('already registered')) {
                            resultados.innerHTML = '<div class="status success">✅ Usuário de teste já existe!</div>';
                        } else {
                            resultados.innerHTML = '<div class="status error">❌ Erro ao criar usuário: ' + error.message + '</div>';
                        }
                    } else {
                        resultados.innerHTML = '<div class="status success">✅ Usuário criado com sucesso! ID: ' + data.user.id + '</div>';
                    }
                } catch (err) {
                    resultados.innerHTML = '<div class="status error">❌ Erro na autenticação: ' + err.message + '</div>';
                }
            } else {
                status.innerHTML = '<div class="status error">❌ Falha ao inicializar Supabase</div>';
            }
        }
        
        async function fazerLogin() {
            const resultados = document.getElementById('resultados');
            
            if (!supabase) {
                if (!initSupabase()) {
                    resultados.innerHTML = '<div class="status error">❌ Supabase não foi inicializado!</div>';
                    return;
                }
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: 'teste@exemplo.com',
                    password: '123456'
                });
                
                if (error) {
                    resultados.innerHTML = '<div class="status error">❌ Erro no login: ' + error.message + '</div>';
                } else {
                    resultados.innerHTML = '<div class="status success">✅ Login realizado com sucesso! Usuário: ' + data.user.email + '</div>';
                    // Salvar sessão
                    localStorage.setItem('supabase_session', JSON.stringify(data));
                }
            } catch (err) {
                resultados.innerHTML = '<div class="status error">❌ Erro no login: ' + err.message + '</div>';
            }
        }
        
        function irParaSistema() {
            window.open('index.html', '_blank');
        }
        
        // Inicializar ao carregar a página
        window.onload = function() {
            testarAuth();
        };
    </script>
</body>
</html>
