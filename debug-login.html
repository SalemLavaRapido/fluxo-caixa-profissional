<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Login - Fluxo de Caixa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .status {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 12px;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .btn { padding: 10px 20px; border-radius: 8px; margin: 5px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; border: none; }
        .btn-success { background: #28a745; color: white; border: none; }
        .btn-danger { background: #dc3545; color: white; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔍 Debug de Login - Fluxo de Caixa</h2>
        <p>Esta página vai mostrar exatamente o que está acontecendo...</p>

        <div id="status" class="status">
            <strong>Inicializando...</strong>
        </div>

        <div class="mt-4">
            <h3>📋 Informações de Configuração:</h3>
            <div id="configInfo"></div>
        </div>

        <div class="mt-4">
            <h3>🧪 Testes de Conexão:</h3>
            <button class="btn btn-primary" onclick="testarConfig()">Testar Configuração</button>
            <button class="btn btn-success" onclick="testarAuth()">Testar Autenticação</button>
            <button class="btn btn-info" onclick="testarTabelas()">Verificar Tabelas</button>
        </div>

        <div class="mt-4">
            <h3>🔑 Teste de Login:</h3>
            <button class="btn btn-danger" onclick="fazerLoginTeste()">Fazer Login Teste</button>
            <button class="btn btn-success" onclick="fazerCadastroTeste()">Fazer Cadastro Teste</button>
        </div>

        <div class="mt-4">
            <h3>📄 Log Completo:</h3>
            <div id="logCompleto" class="status" style="max-height: 300px; overflow-y: auto;">
                <strong>Aguardando testes...</strong>
            </div>
            <button class="btn btn-primary" onclick="limparLog()">Limpar Log</button>
        </div>
    </div>

    <script>
        // Configuração
        const SUPABASE_URL = 'https://emkiewosmlnyjnpujbui.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Bd982ryXG_esL01jPijc_A_2u3pY8vV';
        
        let supabase;
        let log = [];

        function addLog(mensagem, tipo = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            log.push(`[${timestamp}] [${tipo.toUpperCase()}] ${mensagem}`);
            atualizarLog();
        }

        function atualizarLog() {
            const logDiv = document.getElementById('logCompleto');
            logDiv.innerHTML = log.slice(-20).join('<br>'); // Últimas 20 mensagens
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function atualizarStatus(mensagem, tipo = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${tipo}`;
            statusDiv.innerHTML = `<strong>${mensagem}</strong>`;
        }

        function atualizarConfigInfo() {
            const configDiv = document.getElementById('configInfo');
            configDiv.innerHTML = `
                <strong>URL:</strong> ${SUPABASE_URL}<br>
                <strong>ANON_KEY:</strong> ${SUPABASE_ANON_KEY.substring(0, 20)}...<br>
                <strong>Status:</strong> <span id="configStatus">Verificando...</span>
            `;
        }

        async function testarConfig() {
            addLog('Iniciando teste de configuração...', 'info');
            atualizarStatus('Testando configuração...', 'info');
            
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                addLog('Supabase inicializado com sucesso', 'success');
                atualizarStatus('Configuração OK!', 'success');
                document.getElementById('configStatus').innerHTML = '✅ OK';
                return true;
            } catch (error) {
                addLog(`Erro na configuração: ${error.message}`, 'error');
                atualizarStatus('Erro na configuração', 'error');
                document.getElementById('configStatus').innerHTML = '❌ ERRO';
                return false;
            }
        }

        async function testarAuth() {
            addLog('Iniciando teste de autenticação...', 'info');
            
            if (!supabase) {
                addLog('Supabase não inicializado', 'error');
                return;
            }

            try {
                // Testar se consegue obter sessão
                const { data, error } = await supabase.auth.getSession();
                
                if (error) {
                    addLog(`Erro ao obter sessão: ${error.message}`, 'error');
                } else {
                    addLog(`Sessão obtida: ${data ? 'Ativa' : 'Inativa'}`, 'success');
                }
                
                // Testar se consegue acessar auth
                if (supabase.auth.getUser) {
                    const { data: userData } = await supabase.auth.getUser();
                    addLog(`Usuário atual: ${userData ? userData.email : 'Nenhum'}`, 'info');
                } else {
                    addLog('Método auth.getUser não disponível', 'warning');
                }
                
            } catch (error) {
                addLog(`Erro na autenticação: ${error.message}`, 'error');
            }
        }

        async function testarTabelas() {
            addLog('Verificando tabelas no Supabase...', 'info');
            
            if (!supabase) {
                addLog('Supabase não inicializado', 'error');
                return;
            }

            try {
                // Testar acesso à tabela de entradas
                const { data, error } = await supabase
                    .from('entradas')
                    .select('count')
                    .single();
                
                if (error) {
                    addLog(`Erro ao acessar tabela entradas: ${error.message}`, 'error');
                } else {
                    addLog(`Tabela entradas acessada. Total: ${data.count}`, 'success');
                }
                
                // Testar acesso à tabela de saídas
                const { data: saidasData, error: saidasError } = await supabase
                    .from('saidas')
                    .select('count')
                    .single();
                
                if (saidasError) {
                    addLog(`Erro ao acessar tabela saidas: ${saidasError.message}`, 'error');
                } else {
                    addLog(`Tabela saidas acessada. Total: ${saidasData.count}`, 'success');
                }
                
            } catch (error) {
                addLog(`Erro ao verificar tabelas: ${error.message}`, 'error');
            }
        }

        async function fazerLoginTeste() {
            addLog('Iniciando teste de login...', 'info');
            
            if (!supabase) {
                addLog('Supabase não inicializado', 'error');
                return;
            }

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: 'teste@exemplo.com',
                    password: '123456'
                });
                
                if (error) {
                    addLog(`Erro no login teste: ${error.message}`, 'error');
                    atualizarStatus(`Erro no login: ${error.message}`, 'error');
                } else {
                    addLog(`Login teste realizado com sucesso! Usuário: ${data.user.email}`, 'success');
                    atualizarStatus('Login teste OK!', 'success');
                    
                    // Salvar sessão
                    localStorage.setItem('test_session', JSON.stringify(data));
                }
                
            } catch (error) {
                addLog(`Erro no login teste: ${error.message}`, 'error');
                atualizarStatus(`Erro no login: ${error.message}`, 'error');
            }
        }

        async function fazerCadastroTeste() {
            addLog('Iniciando teste de cadastro...', 'info');
            
            if (!supabase) {
                addLog('Supabase não inicializado', 'error');
                return;
            }

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: `teste${Date.now()}@exemplo.com`,
                    password: '123456',
                    options: {
                        data: {
                            name: 'Usuário Teste'
                        }
                    }
                });
                
                if (error) {
                    addLog(`Erro no cadastro teste: ${error.message}`, 'error');
                    atualizarStatus(`Erro no cadastro: ${error.message}`, 'error');
                } else {
                    addLog(`Cadastro teste realizado com sucesso! ID: ${data.user.id}`, 'success');
                    atualizarStatus('Cadastro teste OK!', 'success');
                }
                
            } catch (error) {
                addLog(`Erro no cadastro teste: ${error.message}`, 'error');
                atualizarStatus(`Erro no cadastro: ${error.message}`, 'error');
            }
        }

        function limparLog() {
            log = [];
            atualizarLog();
            addLog('Log limpo', 'info');
        }

        // Inicializar
        window.onload = function() {
            atualizarConfigInfo();
            testarConfig();
        };
    </script>
</body>
</html>
