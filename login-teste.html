<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 500px; margin: 50px auto; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status { padding: 10px; border-radius: 8px; margin: 10px 0; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 class="text-center mb-4">Teste de Conexão Supabase</h2>
            
            <div id="status"></div>
            
            <div class="mb-3">
                <label class="form-label">URL do Supabase:</label>
                <input type="text" id="supabaseUrl" class="form-control" value="https://emkiewosmlnyjnpujbui.supabase.co" readonly>
            </div>
            
            <div class="mb-3">
                <label class="form-label">API Key:</label>
                <input type="text" id="supabaseKey" class="form-control" value="sb_publishable_Bd982ryXG_esL01jPijc_A_2u3pY8vV" readonly>
            </div>
            
            <div class="d-grid gap-2">
                <button class="btn btn-primary" onclick="testarConexao()">Testar Conexão</button>
                <button class="btn btn-success" onclick="criarUsuario()">Criar Usuário Teste</button>
                <button class="btn btn-info" onclick="fazerLogin()">Fazer Login</button>
            </div>
            
            <div class="mt-3">
                <h5>Resultados:</h5>
                <div id="resultados"></div>
            </div>
        </div>
    </div>

    <script>
        let supabase;
        
        function initSupabase() {
            try {
                supabase = window.supabase.createClient(
                    'https://emkiewosmlnyjnpujbui.supabase.co',
                    'sb_publishable_Bd982ryXG_esL01jPijc_A_2u3pY8vV'
                );
                return true;
            } catch (error) {
                console.error('Erro ao inicializar Supabase:', error);
                return false;
            }
        }
        
        async function testarConexao() {
            const status = document.getElementById('status');
            const resultados = document.getElementById('resultados');
            
            if (initSupabase()) {
                status.innerHTML = '<div class="status success">✅ Supabase inicializado com sucesso!</div>';
                
                try {
                    // Testar se consegue acessar o auth
                    const { data, error } = await supabase.auth.getSession();
                    
                    if (error) {
                        resultados.innerHTML = '<div class="status error">❌ Erro ao testar sessão: ' + error.message + '</div>';
                    } else {
                        resultados.innerHTML = '<div class="status success">✅ Conexão funcionando! Sessão: ' + (data ? 'Ativa' : 'Inativa') + '</div>';
                    }
                } catch (err) {
                    resultados.innerHTML = '<div class="status error">❌ Erro na conexão: ' + err.message + '</div>';
                }
            } else {
                status.innerHTML = '<div class="status error">❌ Falha ao inicializar Supabase</div>';
            }
        }
        
        async function criarUsuario() {
            const resultados = document.getElementById('resultados');
            
            if (!supabase) {
                resultados.innerHTML = '<div class="status error">❌ Supabase não foi inicializado!</div>';
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: 'teste@exemplo.com',
                    password: '123456',
                    options: {
                        data: {
                            name: 'Usuário Teste'
                        }
                    }
                });
                
                if (error) {
                    resultados.innerHTML = '<div class="status error">❌ Erro ao criar usuário: ' + error.message + '</div>';
                } else {
                    resultados.innerHTML = '<div class="status success">✅ Usuário criado com sucesso! ID: ' + data.user.id + '</div>';
                }
            } catch (err) {
                resultados.innerHTML = '<div class="status error">❌ Erro ao criar usuário: ' + err.message + '</div>';
            }
        }
        
        async function fazerLogin() {
            const resultados = document.getElementById('resultados');
            
            if (!supabase) {
                resultados.innerHTML = '<div class="status error">❌ Supabase não foi inicializado!</div>';
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: 'teste@exemplo.com',
                    password: '123456'
                });
                
                if (error) {
                    resultados.innerHTML = '<div class="status error">❌ Erro no login: ' + error.message + '</div>';
                } else {
                    resultados.innerHTML = '<div class="status success">✅ Login realizado com sucesso! Usuário: ' + data.user.email + '</div>';
                }
            } catch (err) {
                resultados.innerHTML = '<div class="status error">❌ Erro no login: ' + err.message + '</div>';
            }
        }
        
        // Inicializar ao carregar a página
        window.onload = function() {
            testarConexao();
        };
    </script>
</body>
</html>
