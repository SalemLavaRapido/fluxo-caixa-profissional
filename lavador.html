<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fila de Lavagem - Lavador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --lavagem-gradient: linear-gradient(135deg, #00c6fb 0%, #005bea 100%);
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        
        .navbar-custom {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .card-custom {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .table-lavagens {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        
        .table-lavagens th {
            background: rgba(0, 198, 251, 0.3);
            color: #fff;
            font-weight: 600;
            padding: 15px;
            border: none;
        }
        
        .table-lavagens td {
            color: #333;
            background: rgba(255,255,255,0.9);
            padding: 12px 15px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            vertical-align: middle;
        }
        
        .badge-tipo {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }
        
        .badge-avulso {
            background: var(--warning-gradient);
            color: #fff;
        }
        
        .badge-mensalista {
            background: var(--success-gradient);
            color: #fff;
        }
        
        .placa-badge {
            background: #005bea;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        .btn-voltar {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 10px;
        }
        
        .btn-voltar:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .stats-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .stats-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
        }
        
        .form-control-custom {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 10px;
            padding: 12px 15px;
            color: #333;
        }
        
        .alert-custom {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
        }
        
        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Tela de Login -->
    <div id="loginContainer" class="login-container">
        <div class="text-center mb-4">
            <i class="fas fa-car-wash fa-4x mb-3" style="color: #38ef7d;"></i>
            <h2>Área do Lavador</h2>
            <p class="text-muted" style="color: rgba(255,255,255,0.7) !important;">Acesso restrito para funcionários</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" class="form-control form-control-custom" id="loginUsuario" placeholder="Digite seu usuário" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" class="form-control form-control-custom" id="loginSenha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn w-100" style="background: var(--success-gradient); color: #fff; padding: 12px; border-radius: 10px; font-weight: bold;">
                <i class="fas fa-sign-in-alt me-2"></i>Entrar
            </button>
        </form>
        
        <div id="loginError" class="alert alert-danger mt-3 hidden"></div>
    </div>

    <!-- Conteúdo Principal (escondido até fazer login) -->
    <div id="mainContent" class="hidden">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-car-wash me-2"></i>Fila de Lavagem - Lavador
            </a>
            <div class="d-flex align-items-center">
                <span class="me-3" id="userInfo"></span>
                <button class="btn btn-outline-light" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-2"></i>Sair
                </button>
            </div>
        </div>
    </nav>

    <!-- Container Principal -->
    <div class="container py-4">
        <!-- Alertas -->
        <div id="alertContainer"></div>
        
        <!-- Stats -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stats-card">
                    <i class="fas fa-list-ol fa-2x mb-2" style="color: #ffc107;"></i>
                    <div class="stats-number" id="totalFila">0</div>
                    <div>Na Fila</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card">
                    <i class="fas fa-check-circle fa-2x mb-2" style="color: #38ef7d;"></i>
                    <div class="stats-number" id="totalLavados">0</div>
                    <div>Lavados</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card">
                    <i class="fas fa-clock fa-2x mb-2" style="color: #00c6fb;"></i>
                    <div class="stats-number" id="totalPendentes">0</div>
                    <div>Pendentes</div>
                </div>
            </div>
        </div>
        
        <!-- Fila de Lavagem -->
        <div class="card-custom p-4">
            <h5 class="mb-3">
                <i class="fas fa-list-ol me-2"></i>Fila de Lavagem
                <button class="btn btn-sm btn-outline-light ms-3" onclick="carregarDados()">
                    <i class="fas fa-sync-alt"></i> Atualizar
                </button>
            </h5>
            <div class="row" id="cardsContainer">
                <div class="col-12 text-center py-5">
                    <i class="fas fa-car-wash fa-4x mb-3" style="color: rgba(255,255,255,0.3);"></i>
                    <p style="color: rgba(255,255,255,0.5);">Nenhum veículo na fila</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal Observação -->
    <div class="modal fade" id="modalObservacao" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="background: #1a1a2e; color: #fff;">
                <div class="modal-header" style="border-bottom: 1px solid rgba(255,255,255,0.2);">
                    <h5 class="modal-title"><i class="fas fa-comment me-2"></i>Observação - <span id="obsPlaca"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <textarea id="obsTexto" class="form-control" rows="6" 
                        style="background: #fff; color: #000; font-size: 18px; padding: 15px;"
                        placeholder="Digite a observação..."></textarea>
                </div>
                <div class="modal-footer" style="border-top: 1px solid rgba(255,255,255,0.2);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" onclick="salvarObservacao()">
                        <i class="fas fa-save me-2"></i>Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>
    </div> <!-- Fecha mainContent -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Configuração Supabase
        const SUPABASE_URL = 'https://emkiewosmlnyjnpujbui.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVta2lld29zbWxueWpucHVqYnVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDMxOTIsImV4cCI6MjA5MjM3OTE5Mn0.ohXoyqFJfyJxlyS1Efpykr0l0zezC2MZjVJWf55NV0c';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let filaLavagem = [];
        let currentUser = null;
        
        // Credenciais do lavador (você pode alterar)
        const LAVADOR_USUARIO = 'lavador';
        const LAVADOR_SENHA = '123456';
        
        // Verificar se já está logado
        document.addEventListener('DOMContentLoaded', async () => {
            const lavadorLogado = localStorage.getItem('lavadorLogado');
            const adminUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (lavadorLogado === 'true' && adminUser) {
                currentUser = adminUser;
                mostrarConteudo();
                await carregarDados();
                setInterval(carregarDados, 30000);
            }
        });
        
        // Login do lavador
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usuario = document.getElementById('loginUsuario').value.trim();
            const senha = document.getElementById('loginSenha').value;
            
            // Verificar credenciais do lavador
            if (usuario === LAVADOR_USUARIO && senha === LAVADOR_SENHA) {
                localStorage.setItem('lavadorLogado', 'true');
                mostrarConteudo();
                await carregarDados();
                setInterval(carregarDados, 30000);
            } else {
                document.getElementById('loginError').textContent = 'Usuário ou senha incorretos!';
                document.getElementById('loginError').classList.remove('hidden');
            }
        });
        
        // Mostrar conteúdo principal
        function mostrarConteudo() {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('userInfo').textContent = 'Lavador';
        }
        
        // Carregar dados
        async function carregarDados() {
            // Carregar fila de lavagem (toda a fila, sem filtro de user_id)
            const { data: fila, error } = await supabaseClient
                .from('fila_lavagem')
                .select('*')
                .order('created_at', { ascending: true });
            
            if (!error) {
                filaLavagem = fila || [];
                renderizarFila();
                atualizarEstatisticas();
            }
        }
        
        // Atualizar estatísticas
        function atualizarEstatisticas() {
            const total = filaLavagem.length;
            const lavados = filaLavagem.filter(f => f.lavado).length;
            const pendentes = total - lavados;
            
            document.getElementById('totalFila').textContent = total;
            document.getElementById('totalLavados').textContent = lavados;
            document.getElementById('totalPendentes').textContent = pendentes;
        }
        
        // Renderizar fila de lavagem com cards
        function renderizarFila() {
            const container = document.getElementById('cardsContainer');
            
            if (filaLavagem.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-car-wash fa-4x mb-3" style="color: rgba(255,255,255,0.3);"></i>
                        <p style="color: rgba(255,255,255,0.5);">Nenhum veículo na fila</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filaLavagem.map((f, index) => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100" style="background: ${f.lavado ? '#00a651' : 'rgba(255,255,255,0.95)'}; border-radius: 15px; overflow: hidden;">
                        <div class="card-header d-flex justify-content-between align-items-center" style="background: ${f.lavado ? '#008c44' : '#005bea'}; color: #fff; padding: 15px;">
                            <div>
                                <span class="badge bg-light text-dark me-2" style="font-size: 1.1em;">#${index + 1}</span>
                                <span style="font-size: 1.3em; font-weight: bold; letter-spacing: 2px;">${f.placa}</span>
                            </div>
                            <span class="badge ${f.lavado ? 'bg-light text-success' : 'bg-warning text-dark'}" style="font-size: 0.9em;">
                                ${f.lavado ? '✓ LAVADO' : 'PENDENTE'}
                            </span>
                        </div>
                        <div class="card-body" style="color: ${f.lavado ? '#fff' : '#333'}; padding: 20px;">
                            <div class="row mb-3">
                                <div class="col-6">
                                    <small style="opacity: 0.7;"><i class="fas fa-car me-1"></i>Modelo</small>
                                    <div style="font-size: 1.1em; font-weight: 600;">${f.modelo || '-'}</div>
                                </div>
                                <div class="col-6">
                                    <small style="opacity: 0.7;"><i class="fas fa-palette me-1"></i>Cor</small>
                                    <div style="font-size: 1.1em; font-weight: 600;">${f.cor || '-'}</div>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <small style="opacity: 0.7;"><i class="fas fa-tag me-1"></i>Cliente</small>
                                    <div><span class="badge ${f.tipo_cliente === 'mensalista' ? 'bg-success' : 'bg-warning text-dark'}">${f.tipo_cliente === 'mensalista' ? 'Mensalista' : 'Avulso'}</span></div>
                                </div>
                                <div class="col-6">
                                    <small style="opacity: 0.7;"><i class="fas fa-shower me-1"></i>Lavagem</small>
                                    <div style="font-size: 1.1em; font-weight: 600;">${formatarTipoLavagem(f.tipo_lavagem)}</div>
                                </div>
                            </div>
                            
                            <!-- Observação clicável -->
                            <div class="mb-3" onclick="abrirModalObs('${f.id}', '${f.placa}', '${(f.observacao || '').replace(/'/g, "\\'")}')" style="cursor: pointer; background: ${f.lavado ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.05)'}; border-radius: 10px; padding: 15px; min-height: 80px;">
                                <small style="opacity: 0.7;"><i class="fas fa-comment me-1"></i>Observação <i class="fas fa-edit ms-1" style="font-size: 0.8em;"></i></small>
                                <div style="font-size: 1.1em; margin-top: 5px; word-wrap: break-word;">${f.observacao || '<span style="opacity:0.5;">Clique para adicionar...</span>'}</div>
                            </div>
                            
                            ${f.celular ? `
                            <div class="mb-3">
                                <button class="btn btn-success w-100" onclick="abrirWhatsApp('${f.celular}', 'Olá! Seu veículo ${f.placa} está pronto!')" style="padding: 12px; font-size: 1.1em;">
                                    <i class="fab fa-whatsapp me-2"></i>WhatsApp: ${f.celular}
                                </button>
                            </div>
                            ` : ''}
                        </div>
                        <div class="card-footer" style="background: ${f.lavado ? '#007a3d' : '#f8f9fa'}; padding: 15px;">
                            <button class="btn ${f.lavado ? 'btn-light text-success' : 'btn-primary'} w-100" onclick="marcarLavado('${f.id}')" style="padding: 15px; font-size: 1.2em; font-weight: bold;">
                                <i class="fas fa-car-wash me-2"></i>
                                ${f.lavado ? '✓ LAVADO - Clique para desmarcar' : 'MARCAR COMO LAVADO'}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Variável para guardar ID atual
        let obsIdAtual = null;
        
        // Abrir modal de observação
        function abrirModalObs(id, placa, obs) {
            obsIdAtual = id;
            document.getElementById('obsPlaca').textContent = placa;
            document.getElementById('obsTexto').value = obs || '';
            new bootstrap.Modal(document.getElementById('modalObservacao')).show();
        }
        
        // Salvar observação
        async function salvarObservacao() {
            const obs = document.getElementById('obsTexto').value;
            await atualizarObsFila(obsIdAtual, obs);
            bootstrap.Modal.getInstance(document.getElementById('modalObservacao')).hide();
            await carregarDados();
            showAlert('Observação salva!', 'success');
        }
        
        // Formatar tipo de lavagem
        function formatarTipoLavagem(tipo) {
            const tipos = {
                'simples': 'Simples',
                'completa': 'Completa',
                'polimento': 'Polimento',
                'higienizacao': 'Higienização'
            };
            return tipos[tipo] || tipo || 'Simples';
        }
        
        // Atualizar observação da fila
        async function atualizarObsFila(filaId, observacao) {
            const { error } = await supabaseClient
                .from('fila_lavagem')
                .update({ observacao: observacao })
                .eq('id', filaId);
            
            if (error) {
                showAlert('Erro ao salvar observação!', 'danger');
            } else {
                showAlert('Observação salva!', 'success');
            }
        }
        
        // Marcar como lavado
        async function marcarLavado(filaId) {
            const item = filaLavagem.find(f => f.id === filaId);
            if (!item) return;
            
            const novoStatus = !item.lavado;
            
            const { error } = await supabaseClient
                .from('fila_lavagem')
                .update({ lavado: novoStatus })
                .eq('id', filaId);
            
            if (error) {
                showAlert('Erro ao atualizar: ' + error.message, 'danger');
                return;
            }
            
            showAlert(novoStatus ? '✅ Marcado como PRONTO!' : 'Desmarcado!', 'success');
            await carregarDados();
        }
        
        // Abrir WhatsApp
        function abrirWhatsApp(telefone, mensagem) {
            const numero = telefone.replace(/\D/g, '');
            const url = `https://wa.me/55${numero}?text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
        }
        
        // Mostrar alerta
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            const alertId = 'alert-' + Date.now();
            
            container.innerHTML = `
                <div id="${alertId}" class="alert alert-${type} alert-dismissible fade show alert-custom" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) alert.remove();
            }, 3000);
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('lavadorLogado');
            window.location.reload();
        }
    </script>
</body>
</html>
