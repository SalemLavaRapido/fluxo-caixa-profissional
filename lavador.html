<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fila de Lavagem - Lavador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --lavagem-gradient: linear-gradient(135deg, #00c6fb 0%, #005bea 100%);
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        
        .navbar-custom {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .card-custom {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .table-lavagens {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        
        .table-lavagens th {
            background: rgba(0, 198, 251, 0.3);
            color: #fff;
            font-weight: 600;
            padding: 15px;
            border: none;
        }
        
        .table-lavagens td {
            color: #333;
            background: rgba(255,255,255,0.9);
            padding: 12px 15px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            vertical-align: middle;
        }
        
        .badge-tipo {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }
        
        .badge-avulso {
            background: var(--warning-gradient);
            color: #fff;
        }
        
        .badge-mensalista {
            background: var(--success-gradient);
            color: #fff;
        }
        
        .placa-badge {
            background: #005bea;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        .btn-voltar {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 10px;
        }
        
        .btn-voltar:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .stats-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .stats-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
        }
        
        .form-control-custom {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 10px;
            padding: 12px 15px;
            color: #333;
        }
        
        .alert-custom {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
        }
        
        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Tela de Login -->
    <div id="loginContainer" class="login-container">
        <div class="text-center mb-4">
            <i class="fas fa-car-wash fa-4x mb-3" style="color: #38ef7d;"></i>
            <h2>Área do Lavador</h2>
            <p class="text-muted" style="color: rgba(255,255,255,0.7) !important;">Acesso restrito para funcionários</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" class="form-control form-control-custom" id="loginUsuario" placeholder="Digite seu usuário" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" class="form-control form-control-custom" id="loginSenha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn w-100" style="background: var(--success-gradient); color: #fff; padding: 12px; border-radius: 10px; font-weight: bold;">
                <i class="fas fa-sign-in-alt me-2"></i>Entrar
            </button>
        </form>
        
        <div id="loginError" class="alert alert-danger mt-3 hidden"></div>
    </div>

    <!-- Conteúdo Principal (escondido até fazer login) -->
    <div id="mainContent" class="hidden">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-car-wash me-2"></i>Fila de Lavagem - Lavador
            </a>
            <div class="d-flex align-items-center">
                <span class="me-3" id="userInfo"></span>
                <button class="btn btn-outline-light" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-2"></i>Sair
                </button>
            </div>
        </div>
    </nav>

    <!-- Container Principal -->
    <div class="container py-4">
        <!-- Alertas -->
        <div id="alertContainer"></div>
        
        <!-- Stats -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stats-card">
                    <i class="fas fa-list-ol fa-2x mb-2" style="color: #ffc107;"></i>
                    <div class="stats-number" id="totalFila">0</div>
                    <div>Na Fila</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card">
                    <i class="fas fa-check-circle fa-2x mb-2" style="color: #38ef7d;"></i>
                    <div class="stats-number" id="totalLavados">0</div>
                    <div>Lavados</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card">
                    <i class="fas fa-clock fa-2x mb-2" style="color: #00c6fb;"></i>
                    <div class="stats-number" id="totalPendentes">0</div>
                    <div>Pendentes</div>
                </div>
            </div>
        </div>
        
        <!-- Fila de Lavagem -->
        <div class="card-custom p-4">
            <h5 class="mb-3">
                <i class="fas fa-list-ol me-2"></i>Fila de Lavagem
                <button class="btn btn-sm btn-outline-light ms-3" onclick="carregarDados()">
                    <i class="fas fa-sync-alt"></i> Atualizar
                </button>
            </h5>
            <div class="table-responsive table-lavagens">
                <table class="table mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th><i class="fas fa-car me-2"></i>Placa</th>
                            <th><i class="fas fa-car-side me-2"></i>Modelo</th>
                            <th><i class="fas fa-palette me-2"></i>Cor</th>
                            <th><i class="fas fa-tag me-2"></i>Cliente</th>
                            <th><i class="fas fa-shower me-2"></i>Lavagem</th>
                            <th><i class="fas fa-phone me-2"></i>Celular</th>
                            <th><i class="fas fa-comment me-2"></i>Observação</th>
                            <th><i class="fas fa-cog me-2"></i>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaFila">
                        <tr>
                            <td colspan="9" class="empty-state">
                                <i class="fas fa-car-wash"></i>
                                <p>Nenhum veículo na fila</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    </div> <!-- Fecha mainContent -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Configuração Supabase
        const SUPABASE_URL = 'https://xjwsollreczvtxfnlwbp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhqd3NvbGxyZWN6dnR4Zm5sd2JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUxNzYxNjMsImV4cCI6MjA2MDc1MjE2M30.KeOWMeYGOmPjyHbLRLnX4VgLvN7sLCMetxmtpCKfWjQ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let filaLavagem = [];
        let currentUser = null;
        
        // Credenciais do lavador (você pode alterar)
        const LAVADOR_USUARIO = 'lavador';
        const LAVADOR_SENHA = '123456';
        
        // Verificar se já está logado
        document.addEventListener('DOMContentLoaded', async () => {
            const lavadorLogado = localStorage.getItem('lavadorLogado');
            const adminUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (lavadorLogado === 'true' && adminUser) {
                currentUser = adminUser;
                mostrarConteudo();
                await carregarDados();
                setInterval(carregarDados, 30000);
            }
        });
        
        // Login do lavador
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usuario = document.getElementById('loginUsuario').value.trim();
            const senha = document.getElementById('loginSenha').value;
            
            // Verificar credenciais do lavador
            if (usuario === LAVADOR_USUARIO && senha === LAVADOR_SENHA) {
                localStorage.setItem('lavadorLogado', 'true');
                mostrarConteudo();
                await carregarDados();
                setInterval(carregarDados, 30000);
            } else {
                document.getElementById('loginError').textContent = 'Usuário ou senha incorretos!';
                document.getElementById('loginError').classList.remove('hidden');
            }
        });
        
        // Mostrar conteúdo principal
        function mostrarConteudo() {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('userInfo').textContent = 'Lavador';
        }
        
        // Carregar dados
        async function carregarDados() {
            // Carregar fila de lavagem (toda a fila, sem filtro de user_id)
            const { data: fila, error } = await supabaseClient
                .from('fila_lavagem')
                .select('*')
                .order('created_at', { ascending: true });
            
            if (!error) {
                filaLavagem = fila || [];
                renderizarFila();
                atualizarEstatisticas();
            }
        }
        
        // Atualizar estatísticas
        function atualizarEstatisticas() {
            const total = filaLavagem.length;
            const lavados = filaLavagem.filter(f => f.lavado).length;
            const pendentes = total - lavados;
            
            document.getElementById('totalFila').textContent = total;
            document.getElementById('totalLavados').textContent = lavados;
            document.getElementById('totalPendentes').textContent = pendentes;
        }
        
        // Renderizar fila de lavagem
        function renderizarFila() {
            const tbody = document.getElementById('tabelaFila');
            
            if (filaLavagem.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" class="empty-state">
                            <i class="fas fa-car-wash"></i>
                            <p>Nenhum veículo na fila</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = filaLavagem.map((f, index) => `
                <tr style="${f.lavado ? 'background: linear-gradient(135deg, #11998e, #38ef7d) !important;' : ''}">
                    <td><span class="badge ${f.lavado ? 'bg-success' : 'bg-warning text-dark'}">${index + 1}</span></td>
                    <td><span class="placa-badge">${f.placa}</span></td>
                    <td>${f.modelo || '-'}</td>
                    <td>${f.cor || '-'}</td>
                    <td>
                        <span class="badge-tipo ${f.tipo_cliente === 'mensalista' ? 'badge-mensalista' : 'badge-avulso'}">
                            ${f.tipo_cliente === 'mensalista' ? 'Mensalista' : 'Avulso'}
                        </span>
                    </td>
                    <td>${formatarTipoLavagem(f.tipo_lavagem)}</td>
                    <td>
                        ${f.celular ? `
                            <button class="btn btn-success btn-sm" onclick="abrirWhatsApp('${f.celular}', 'Olá! Seu veículo ${f.placa} está pronto!')" title="WhatsApp">
                                <i class="fab fa-whatsapp"></i>
                            </button>
                            <small class="ms-1">${f.celular}</small>
                        ` : '-'}
                    </td>
                    <td>
                        <input type="text" class="form-control form-control-sm" 
                               value="${f.observacao || ''}" 
                               onchange="atualizarObsFila('${f.id}', this.value)"
                               placeholder="Adicionar observação..."
                               style="background: #fff; border: 1px solid #ccc; color: #000; min-width: 200px; font-weight: 500;">
                    </td>
                    <td>
                        <button class="btn ${f.lavado ? 'btn-secondary' : 'btn-info'} btn-sm" onclick="marcarLavado('${f.id}')" title="${f.lavado ? 'Desmarcar' : 'Marcar como Pronto'}">
                            <i class="fas fa-car-wash me-1"></i>
                            ${f.lavado ? 'Pronto' : 'Lavar'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        // Formatar tipo de lavagem
        function formatarTipoLavagem(tipo) {
            const tipos = {
                'simples': 'Simples',
                'completa': 'Completa',
                'polimento': 'Polimento',
                'higienizacao': 'Higienização'
            };
            return tipos[tipo] || tipo || 'Simples';
        }
        
        // Atualizar observação da fila
        async function atualizarObsFila(filaId, observacao) {
            const { error } = await supabaseClient
                .from('fila_lavagem')
                .update({ observacao: observacao })
                .eq('id', filaId);
            
            if (error) {
                showAlert('Erro ao salvar observação!', 'danger');
            } else {
                showAlert('Observação salva!', 'success');
            }
        }
        
        // Marcar como lavado
        async function marcarLavado(filaId) {
            const item = filaLavagem.find(f => f.id === filaId);
            if (!item) return;
            
            const novoStatus = !item.lavado;
            
            const { error } = await supabaseClient
                .from('fila_lavagem')
                .update({ lavado: novoStatus })
                .eq('id', filaId);
            
            if (error) {
                showAlert('Erro ao atualizar: ' + error.message, 'danger');
                return;
            }
            
            showAlert(novoStatus ? '✅ Marcado como PRONTO!' : 'Desmarcado!', 'success');
            await carregarDados();
        }
        
        // Abrir WhatsApp
        function abrirWhatsApp(telefone, mensagem) {
            const numero = telefone.replace(/\D/g, '');
            const url = `https://wa.me/55${numero}?text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
        }
        
        // Mostrar alerta
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            const alertId = 'alert-' + Date.now();
            
            container.innerHTML = `
                <div id="${alertId}" class="alert alert-${type} alert-dismissible fade show alert-custom" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) alert.remove();
            }, 3000);
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('lavadorLogado');
            window.location.reload();
        }
    </script>
</body>
</html>
